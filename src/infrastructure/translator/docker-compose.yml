services:
  translator:
    build:
      context: ../../translator
      dockerfile: Dockerfile
    volumes:
      - ../../translator:/app
    working_dir: /app
    environment:
      - DATABASE_URL=postgresql://translator:translator@postgres:5432/translator
      - COLLECTOR_URL=http://data_collector:8010
      - SCHEDULER_URL=http://scheduler:8011
      - AGGREGATOR_URL=http://aggregator:8014
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8015
      - HTTP_TIMEOUT=300
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8015:8015"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: translator
      POSTGRES_PASSWORD: translator
      POSTGRES_DB: translator
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U translator"]
      interval: 5s
      timeout: 5s
      retries: 5
