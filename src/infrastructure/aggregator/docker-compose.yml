services:
  aggregator:
    build:
      context: ../../aggregator
      dockerfile: Dockerfile
    volumes:
      - ../../aggregator:/app
    working_dir: /app
    environment:
      - API_SERVER_URL=http://api_server:8000
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8003
      - LOG_LEVEL=INFO
      - REQUEST_TIMEOUT=30.0
      - PYTHONPATH=/app
    depends_on:
      api_server:
        condition: service_healthy
    ports:
      - "8003:8003"

  api_server:
    build:
      context: ../../api_server
      dockerfile: Dockerfile
    volumes:
      - ../../api_server:/app
    working_dir: /app
    environment:
      - DATABASE_URL=postgresql://api_server:api_server@postgres:5432/api_server
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/files?limit=1')"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "8000:8000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: api_server
      POSTGRES_PASSWORD: api_server
      POSTGRES_DB: api_server
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api_server"]
      interval: 5s
      timeout: 5s
      retries: 5
