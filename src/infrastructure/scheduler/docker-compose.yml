services:
  scheduler:
    build:
      context: ../../scheduler
      dockerfile: Dockerfile
    volumes:
      - ../../scheduler:/app
      - ../../utilities:/utilities
    working_dir: /app
    environment:
      - ANALYZER_URL=http://analyzer:8002
      - API_SERVER_URL=http://api-server:8000
      - PREFECT_API_URL=http://prefect-server:4200/api
      - DATABASE_URL=postgresql://scheduler:scheduler@postgres:5432/scheduler
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8001
      - STEP_DESCRIPTIVE_STATISTICS_BUCKET=raw-data
      - STEP_DATA_CLEANING_BUCKET=raw-data
      - STEP_TEMPORAL_ANALYSIS_BUCKET=cleaned-data
      - STEP_GEOSPATIAL_ANALYSIS_BUCKET=cleaned-data
      - STEP_FARE_REVENUE_ANALYSIS_BUCKET=cleaned-data
      - PYTHONPATH=/app:/
    depends_on:
      postgres:
        condition: service_healthy
      prefect-server:
        condition: service_healthy
    ports:
      - "8001:8001"

  prefect-server:
    image: prefecthq/prefect:3-latest
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: scheduler
      POSTGRES_DB: scheduler
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduler"]
      interval: 5s
      timeout: 5s
      retries: 5
